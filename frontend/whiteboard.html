<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CanvasFlow Lite — Whiteboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div class="whiteboard-page" id="app">

    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <a href="/" class="topbar-logo">CanvasFlow</a>
        <div class="room-info">
          <span>Room:</span>
          <span class="room-id-display" id="room-id-display" title="Click to copy">—</span>
          <span>·</span>
          <span id="room-name-display">—</span>
        </div>
        <button class="icon-btn" id="btn-share" title="Share Room">&#128279;</button>
      </div>
      <div class="topbar-right">
        <div class="users-list" id="users-list"></div>
        <button class="icon-btn" id="btn-participants" title="Participants">&#128101;</button>
        <button class="icon-btn" id="btn-chat" title="Chat (C)">&#128172;<span class="badge" id="chat-badge" style="display:none">0</span></button>
        <button class="icon-btn" id="btn-export" title="Export PNG">&#128190;</button>
        <button class="icon-btn" id="btn-theme" title="Toggle theme">&#127769;</button>
      </div>
    </header>

    <!-- Canvas Area -->
    <div class="canvas-area" id="canvas-area">
      <canvas id="drawing-canvas"></canvas>
      <div id="sticky-notes-layer"></div>

      <!-- Zoom controls -->
      <div class="zoom-controls">
        <button class="icon-btn" id="btn-zoom-in" title="Zoom in">+</button>
        <div class="zoom-label" id="zoom-label">100%</div>
        <button class="icon-btn" id="btn-zoom-out" title="Zoom out">&minus;</button>
        <button class="icon-btn" id="btn-zoom-reset" title="Reset" style="font-size:0.7rem;margin-top:2px;">FIT</button>
      </div>

      <!-- Floating Toolbar -->
      <div class="toolbar" id="toolbar">
        <button class="tool-btn active" data-tool="pen" id="tool-pen" title="Pen (P)">&#9998;</button>
        <button class="tool-btn" data-tool="highlighter" id="tool-highlighter" title="Highlighter (H)">&#9997;</button>
        <button class="tool-btn" data-tool="line" id="tool-line" title="Line (L)">&#9585;</button>
        <button class="tool-btn" data-tool="rect" id="tool-rect" title="Rectangle (R)">&#9633;</button>
        <button class="tool-btn" data-tool="circle" id="tool-circle" title="Circle (O)">&#9675;</button>
        <button class="tool-btn" data-tool="arrow" id="tool-arrow" title="Arrow (A)">&#10148;</button>
        <button class="tool-btn" data-tool="text" id="tool-text" title="Text (T)">&#84;</button>
        <button class="tool-btn" data-tool="eraser" id="tool-eraser" title="Eraser (E)">&#9003;</button>
        <button class="tool-btn" data-tool="laser" id="tool-laser" title="Laser Pointer (W)">&#128308;</button>

        <div class="toolbar-divider"></div>

        <!-- Quick color palette -->
        <div class="quick-colors" id="quick-colors">
          <div class="qcolor active" data-color="#00d4ff" style="background:#00d4ff" title="Cyan"></div>
          <div class="qcolor" data-color="#FF6B6B" style="background:#FF6B6B" title="Red"></div>
          <div class="qcolor" data-color="#10b981" style="background:#10b981" title="Green"></div>
          <div class="qcolor" data-color="#F59E0B" style="background:#F59E0B" title="Yellow"></div>
          <div class="qcolor" data-color="#8B5CF6" style="background:#8B5CF6" title="Purple"></div>
          <div class="qcolor" data-color="#FFFFFF" style="background:#FFFFFF" title="White"></div>
        </div>
        <div class="color-picker-wrapper">
          <div class="color-display" id="color-display" style="background:#00d4ff;"></div>
          <input type="color" id="color-picker" value="#00d4ff">
        </div>

        <div class="size-control">
          <input type="range" class="size-slider" id="size-slider" min="1" max="30" value="3">
          <span class="size-label" id="size-label">3</span>
        </div>

        <div class="toolbar-divider"></div>

        <button class="tool-btn" id="btn-sticky" title="Add Sticky Note (N)">&#128466;</button>
        <button class="tool-btn" id="btn-undo" title="Undo (Ctrl+Z)">&#8630;</button>
        <button class="tool-btn" id="btn-redo" title="Redo (Ctrl+Y)">&#8631;</button>
        <button class="tool-btn" id="btn-clear" title="Clear All">&#128465;</button>
      </div>

      <!-- Chat Panel -->
      <div class="chat-panel" id="chat-panel">
        <div class="chat-header">
          <h3>&#128172; Chat</h3>
          <button class="chat-close" id="btn-chat-close">&times;</button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="typing-indicator" id="typing-indicator"></div>
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="chat-input" placeholder="Type a message..." maxlength="500" autocomplete="off">
          <button class="chat-send-btn" id="btn-chat-send">&#10148;</button>
        </div>
      </div>

      <!-- Participants Panel -->
      <div class="participants-panel" id="participants-panel">
        <div class="chat-header">
          <h3>&#128101; Participants</h3>
          <button class="chat-close" id="btn-participants-close">&times;</button>
        </div>
        <div class="participants-list" id="participants-list"></div>
      </div>
    </div>

    <!-- Share Modal -->
    <div class="modal-overlay" id="share-modal" style="display:none">
      <div class="modal-card">
        <h3>&#128279; Share This Room</h3>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin:0.75rem 0;">Share this link or Room ID so others can join:</p>
        <div class="share-link-box">
          <input type="text" id="share-link" class="form-input" readonly style="font-size:0.8rem;">
          <button class="btn btn-primary" id="btn-copy-link" style="width:auto;padding:0.6rem 1rem;font-size:0.8rem;white-space:nowrap;">Copy Link</button>
        </div>
        <div style="text-align:center;margin-top:0.75rem;">
          <span style="font-size:0.75rem;color:var(--text-muted);">Room ID:</span>
          <span id="share-room-id" style="font-family:monospace;color:var(--accent);font-weight:700;font-size:0.95rem;margin-left:4px;"></span>
        </div>
        <button class="btn btn-secondary" id="btn-close-share" style="margin-top:1rem;">Close</button>
      </div>
    </div>

    <!-- Text Input Overlay (for text tool) -->
    <textarea id="text-input-overlay" class="text-input-overlay" style="display:none" placeholder="Type here..."></textarea>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Activity feed -->
    <div class="activity-feed" id="activity-feed"></div>
  </div>

  <script src="js/state.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
